<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SenangWebs One Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Documentation for SenangWebs One" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Docsify Dark Theme -->
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css"
    />

    <style>
      :root {
        --theme-color: #007370;
      }
      body,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .sidebar,
      .markdown-section {
        font-family: "Outfit", sans-serif !important;
      }
      .github-corner svg {
        color: #ffffff !important;
      }
      .sidebar, .markdown-section pre, .markdown-section pre>code {
        background-color: #18181b;
      }
      input[type="search"] {
        background-color: #ffffff1a !important;
        border-radius: 8px;
      }
      .markdown-section h1,
      .markdown-section h2,
      .markdown-section h3,
      .markdown-section h4,
      .markdown-section strong {
        color: #007370 !important;
      }
      .markdown-section pre {
        border-radius: 8px;
      }
      .search {
        border-color: #ffffff1a !important;
      }
      .matching-post {
        border-bottom: 1px solid #ffffff1a !important;
      }
      .sidebar-toggle {
        background: transparent !important;
      }
      body {
        background-color: #09090b;
      }
      .markdown-section code {
        color: #00ff99 !important;
      }
      .markdown-section p.tip,
      .markdown-section tr:nth-child(2n) {
        background-color: #ffffff1a !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "SenangWebs One",
        repo: "https://github.com/a-hakim/senangwebs-one",
        loadSidebar: true,
        subMaxLevel: 3,
        auto2top: true,
        search: "auto",
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "Search...",
          noData: "No Results!",
          depth: 6,
          hideOtherSidebarContent: false,
        },
      };
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <!-- Search Plugin -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <!-- Copy Code Plugin -->
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <!-- Prism Language Support -->
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  </body>
</html>
